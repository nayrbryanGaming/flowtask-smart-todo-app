name: flowtask
description: "FlowTask - Turn your daily chaos into focused progress. A smart productivity and task management app."
publish_to: 'none'
version: 1.0.9+28

environment:
  sdk: '>=3.9.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Firebase Core
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_messaging: ^15.1.3
  firebase_analytics: ^11.3.3

  # State Management
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^14.3.0

  # UI & Design
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  lottie: ^3.1.2
  shimmer: ^3.0.0
  fl_chart: ^0.69.0
  percent_indicator: ^4.2.3
  awesome_notifications: ^0.11.0

  # Storage & Preferences
  shared_preferences: ^2.3.2
  flutter_secure_storage: ^9.2.2

  # Utilities
  intl: ^0.20.2
  uuid: ^4.4.2
  equatable: ^2.0.5
  dartz: ^0.10.1
  connectivity_plus: ^6.0.5
  package_info_plus: ^8.0.2
  url_launcher: ^6.3.0
  share_plus: ^10.0.2

  # Forms & Validation
  flutter_form_builder: ^9.4.0
  form_builder_validators: ^11.0.0

  # Date & Time
  table_calendar: ^3.1.2
  flutter_datetime_picker_plus: ^2.1.0

  # Icons & Assets
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.4.1
  smooth_page_indicator: ^1.1.0
  confetti: ^0.7.0
  timezone: ^0.10.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

dependency_overrides:
  intl: 0.20.2

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
